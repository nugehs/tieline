name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1; upgrade so
      # `npm publish` can authenticate via id-token. Requires Trusted
      # Publishing to be configured for @nugehs/tieline on npmjs.com
      # (repo nugehs/tieline, workflow release.yml).
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # tieline has zero runtime/dev dependencies — nothing to install.
      - name: Test
        run: npm test

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            /^## \[/ && found { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG section found for $VERSION" > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md

      - name: Publish to npm
        run: npm publish --access public
